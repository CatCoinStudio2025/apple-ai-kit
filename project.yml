name: AppleAIKit
options:
  bundleIdPrefix: com.appleaikit
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

targets:
  NLUCore:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/NLUCore
    dependencies: []
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_NAME: NLUCore

  ToolRouter:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/ToolRouter
    dependencies:
      - target: NLUCore
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_NAME: ToolRouter

  ResponseEngine:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/ResponseEngine
    dependencies:
      - target: NLUCore
      - target: ToolRouter
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_NAME: ResponseEngine

  ResponseRenderer:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/ResponseRenderer
    dependencies:
      - target: NLUCore
      - target: ResponseEngine
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_NAME: ResponseRenderer

  LLMEngine:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/LLMEngine
    dependencies:
      - target: NLUCore
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_NAME: LLMEngine

  LLMEngineApple:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/LLMEngineApple
    dependencies:
      - target: LLMEngine
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_NAME: LLMEngineApple

  AppleBaseLMApp:
    type: application
    platform: macOS
    sources:
      - path: App/App
    dependencies:
      - target: NLUCore
      - target: ToolRouter
      - target: ResponseEngine
      - target: LLMEngine
      - target: LLMEngineApple
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_NAME: AppleBaseLMApp
        PRODUCT_BUNDLE_IDENTIFIER: com.appleaikit.applebaselm
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/App/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "26.0"
